services:
  sticker-word-lab:
    build: .
    init: true
    user: "${SWL_RUN_UID:-10001}:${SWL_RUN_GID:-10001}"
    restart: unless-stopped
    ports:
      - "${SWL_HTTP_BIND:-0.0.0.0}:${SWL_HTTP_PORT:-8000}:8000"
    mem_limit: "${SWL_APP_MEMORY_LIMIT:-512m}"
    mem_reservation: "${SWL_APP_MEMORY_RESERVATION:-128m}"
    cpus: "${SWL_APP_CPUS:-0.75}"
    pids_limit: 256
    environment:
      SWL_PUBLIC_URL: "${SWL_PUBLIC_URL:-http://127.0.0.1:8000}"
      SWL_ALLOWED_ORIGINS: "${SWL_ALLOWED_ORIGINS:-http://127.0.0.1:8000,http://localhost:8000}"
      SWL_ADMIN_TOKEN: "${SWL_ADMIN_TOKEN:-}"
      SWL_PRIVACY_SALT: "${SWL_PRIVACY_SALT:-change-me-before-public-deploy}"
      SWL_ENABLE_HSTS: "${SWL_ENABLE_HSTS:-0}"
      SWL_TRUST_PROXY: "${SWL_TRUST_PROXY:-0}"
      SWL_MAX_IMAGE_BYTES: "${SWL_MAX_IMAGE_BYTES:-5242880}"
    volumes:
      - ./backend/data:/app/backend/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
