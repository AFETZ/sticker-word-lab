services:
  sticker-word-lab:
    build: .
    init: true
    user: "${SWL_RUN_UID:-10001}:${SWL_RUN_GID:-10001}"
    restart: unless-stopped
    expose:
      - "8000"
    mem_limit: "${SWL_APP_MEMORY_LIMIT:-512m}"
    mem_reservation: "${SWL_APP_MEMORY_RESERVATION:-128m}"
    cpus: "${SWL_APP_CPUS:-0.75}"
    pids_limit: 256
    environment:
      SWL_PUBLIC_URL: "${SWL_PUBLIC_URL:?Set SWL_PUBLIC_URL in .env}"
      SWL_ALLOWED_ORIGINS: "${SWL_ALLOWED_ORIGINS:?Set SWL_ALLOWED_ORIGINS in .env}"
      SWL_ADMIN_TOKEN: "${SWL_ADMIN_TOKEN:?Set SWL_ADMIN_TOKEN in .env}"
      SWL_PRIVACY_SALT: "${SWL_PRIVACY_SALT:?Set SWL_PRIVACY_SALT in .env}"
      SWL_ENABLE_HSTS: "${SWL_ENABLE_HSTS:-1}"
      SWL_TRUST_PROXY: "${SWL_TRUST_PROXY:-1}"
      SWL_MAX_IMAGE_BYTES: "${SWL_MAX_IMAGE_BYTES:-5242880}"
    volumes:
      - ./backend/data:/app/backend/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    mem_limit: "${SWL_CADDY_MEMORY_LIMIT:-128m}"
    mem_reservation: "${SWL_CADDY_MEMORY_RESERVATION:-32m}"
    cpus: "${SWL_CADDY_CPUS:-0.25}"
    pids_limit: 128
    depends_on:
      sticker-word-lab:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:?Set DOMAIN in .env}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true

volumes:
  caddy_data:
  caddy_config:
